<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>halo 가상기기 쇼룸</title>
    <style>
        :root {
            --bg-color: #0d0f14;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: #e0e0e0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #fff;
            margin-bottom: 8px;
            font-weight: 400;
            letter-spacing: 0.1em;
            font-size: 22px;
        }

        .subtitle {
            color: #7EB5D6;
            font-size: 12px;
            letter-spacing: 0.2em;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .container {
            display: flex;
            width: 1000px;
            max-width: 100%;
            background: #13161e;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .control-panel {
            width: 45%;
            padding: 32px;
            border-right: 1px solid #1e2230;
        }

        .halo-message-box {
            background: linear-gradient(135deg, #0d1520, #131a28);
            border: 1px solid #2a3a52;
            border-left: 3px solid #7EB5D6;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 24px;
            min-height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .halo-message-icon { font-size: 18px; flex-shrink: 0; }

        .halo-message-text {
            font-size: 14px;
            color: #B8D4F0;
            line-height: 1.5;
            font-style: italic;
        }

        .halo-message-text.empty {
            color: #4a5568;
            font-style: normal;
        }

        .form-group { margin-bottom: 22px; }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 10px;
            color: #7a8499;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .power-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 30px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a2e3a;
            transition: .4s; border-radius: 30px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 22px; width: 22px;
            left: 4px; bottom: 4px;
            background-color: #fff;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #7EB5D6; }
        input:checked + .slider:before { transform: translateX(26px); }
        .switch-charging input:checked + .slider { background-color: #22c55e; }

        .battery-display {
            display: flex;
            align-items: center;
            background: #0d1016;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #1e2230;
        }

        .battery-left { display: flex; flex-direction: column; gap: 4px; }

        .battery-gauge {
            font-size: 22px;
            font-weight: 700;
            color: #7EB5D6;
            font-variant-numeric: tabular-nums;
        }
        .battery-gauge.low { color: #ef4444; }

        .charge-label { font-size: 11px; color: #4a5568; letter-spacing: 0.05em; }
        .charge-label.charging { color: #22c55e; }
        .charge-label.discharging { color: #6b7280; }

        .range-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .range-label { font-size: 12px; color: #7a8499; text-transform: uppercase; letter-spacing: 0.08em; }
        .range-val { font-size: 14px; font-weight: 700; color: #7EB5D6; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%; height: 4px;
            background: #1e2230;
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #7EB5D6;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(126,181,214,0.5);
        }

        .fixed-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0d1016;
            border: 1px solid #1e2230;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            color: #7EB5D6;
        }
        .fixed-badge span { color: #4a5568; font-size: 11px; }

        /* 비주얼 패널 */
        .visual-panel {
            width: 55%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 30px 20px;
            transition: background-color 0.5s;
            overflow: hidden;
        }

        /*
         * lamp-wrapper: PNG 비율(1503:2244 ≈ 2:3) 유지
         * 패널 높이(480px 기준)에 맞추면 width ≈ 480×(1503/2244) ≈ 321px
         * max-width로 패널 내에서 넘치지 않도록 제한
         */
        .lamp-wrapper {
            position: relative;
            width: 72%;          /* 비주얼 패널 폭의 72% */
            max-width: 310px;
            aspect-ratio: 1503 / 2244;  /* PNG 원본 비율 */
        }

        /* 뒤 글로우 (PNG 아래) */
        .lamp-glow {
            position: absolute;
            /* 중심점: 원래 상단 기준에서 215px 아래로 이동 → top으로 위치 지정 */
            left: 50%;
            top: calc(215px - 35%);   /* 글로우 원 반지름(35%) 만큼 올려서 중심 정렬 */
            transform: translateX(-50%);
            width: 140%;
            aspect-ratio: 1 / 1;      /* 정원 */
            border-radius: 50%;
            background: radial-gradient(
                circle at 50% 50%,
                rgba(255, 252, 210, 0.60) 0%,
                rgba(255, 235, 140, 0.25) 35%,
                rgba(255, 210,  80, 0.06) 65%,
                transparent 100%
            );
            transition: opacity 0.4s;
            pointer-events: none;
            z-index: 0;
        }

        /* halo PNG */
        .lamp-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            transition: filter 0.4s, opacity 0.4s;
        }

        /* 앞 글로우 오버레이 (mix-blend-mode: screen) */
        .lamp-glow-overlay {
            position: absolute;
            left: 50%;
            top: calc(215px - 30%);   /* 뒤 글로우와 동일 중심, 크기만 약간 작게 */
            transform: translateX(-50%);
            width: 120%;
            aspect-ratio: 1 / 1;      /* 정원 */
            border-radius: 50%;
            background: radial-gradient(
                circle at 50% 50%,
                rgba(255, 252, 220, 0.45) 0%,
                rgba(255, 235, 150, 0.12) 45%,
                transparent 70%
            );
            mix-blend-mode: screen;
            transition: opacity 0.4s;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>

    <h1>halo</h1>
    <div class="subtitle">Nordic Mood — Virtual Device Showroom</div>

    <div class="container">

        <!-- 컨트롤 패널 -->
        <div class="control-panel">

            <div class="halo-message-box">
                <div class="halo-message-icon">🌙</div>
                <div class="halo-message-text empty" id="halo-message">halo의 메시지를 기다리는 중...</div>
            </div>

            <div class="form-group">
                <div class="power-row">
                    <label style="margin:0;">전원 ON / OFF</label>
                    <label class="switch">
                        <input type="checkbox" id="power" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <div class="power-row">
                    <label style="margin:0;">충전 ON / OFF</label>
                    <label class="switch switch-charging">
                        <input type="checkbox" id="charging">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>배터리 잔량</label>
                <div class="battery-display">
                    <div class="battery-left">
                        <span id="battery-gauge" class="battery-gauge">80.0%</span>
                        <span id="charge-label" class="charge-label discharging">방전중</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <div class="range-row">
                    <span class="range-label">밝기</span>
                    <span id="brightness-val" class="range-val">40%</span>
                </div>
                <input type="range" id="brightness" min="0" max="100" value="40">
            </div>

            <div class="form-group">
                <label>색온도 (고정)</label>
                <div class="fixed-badge">
                    🌡️ 2700K — 전구색 (따뜻함) <span>변경 불가</span>
                </div>
            </div>

        </div>

        <!-- 비주얼 패널 -->
        <div class="visual-panel" id="visual-panel">
            <div class="lamp-wrapper">
                <div class="lamp-glow"         id="lamp-glow"></div>
                <img  class="lamp-img"          id="lamp-img" src="halo.png" alt="halo lamp">
                <div class="lamp-glow-overlay"  id="lamp-glow-overlay"></div>
            </div>
        </div>
    </div>

    <script>
        const MCP_WORKER_URL = "https://halo.typica-918.workers.dev";

        let state = {
            power: true,
            battery: 80.0,
            brightness: 40,
            charging: false,
            uptimeMinutes: 0,
        };

        const elPower            = document.getElementById('power');
        const elCharging         = document.getElementById('charging');
        const elBattery          = document.getElementById('battery-gauge');
        const elChargeLabel      = document.getElementById('charge-label');
        const elBrightness       = document.getElementById('brightness');
        const elBrightVal        = document.getElementById('brightness-val');
        const elVisualPanel      = document.getElementById('visual-panel');
        const elHaloMsg          = document.getElementById('halo-message');
        const elLampImg          = document.getElementById('lamp-img');
        const elLampGlow         = document.getElementById('lamp-glow');
        const elLampGlowOverlay  = document.getElementById('lamp-glow-overlay');

        function updateVisuals() {
            elBattery.textContent = state.battery.toFixed(1) + '%';
            elBattery.classList.toggle('low', state.battery <= 20);

            if (state.charging) {
                elChargeLabel.textContent = '충전중 ⚡';
                elChargeLabel.className = 'charge-label charging';
            } else {
                elChargeLabel.textContent = '방전중';
                elChargeLabel.className = 'charge-label discharging';
            }

            if (!state.power || state.battery <= 0) {
                elLampImg.style.filter   = 'brightness(0.15) saturate(0.2)';
                elLampImg.style.opacity  = '0.5';
                elLampGlow.style.opacity         = '0';
                elLampGlowOverlay.style.opacity  = '0';
                elVisualPanel.style.backgroundColor = '#080a0e';
                return;
            }

            const b = state.brightness / 100;

            // 이미지 밝기: 밝기 0% → 0.25, 100% → 1.15
            const imgBrightness = 0.25 + b * 0.90;
            elLampImg.style.filter  = `brightness(${imgBrightness.toFixed(2)})`;
            elLampImg.style.opacity = (0.55 + b * 0.45).toFixed(2);

            elLampGlow.style.opacity        = (b * 0.88).toFixed(2);
            elLampGlowOverlay.style.opacity = (b * 0.72).toFixed(2);

            elVisualPanel.style.backgroundColor =
                `rgba(13,15,20,${(1 - b * 0.12).toFixed(2)})`;
        }

        let lastStateStr = "";

        async function pushStateToServer() {
            try {
                const body = JSON.stringify(state);
                await fetch(`${MCP_WORKER_URL}/state`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body,
                });
                lastStateStr = body;
            } catch (err) { console.error('상태 저장 오류:', err); }
        }

        async function pushHaloMessage(message) {
            try {
                await fetch(`${MCP_WORKER_URL}/last-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });
                renderHaloMessage(message);
            } catch (err) { console.error('발화 저장 오류:', err); }
        }

        elPower.addEventListener('change', (e) => {
            state.power = e.target.checked;
            if (!state.power) pushHaloMessage('저 켜주세요, 심심해요.');
            updateVisuals();
            pushStateToServer();
        });

        elCharging.addEventListener('change', (e) => {
            state.charging = e.target.checked;
            updateVisuals();
            pushStateToServer();
        });

        elBrightness.addEventListener('input', (e) => {
            state.brightness = parseInt(e.target.value);
            elBrightVal.textContent = state.brightness + '%';
            updateVisuals();
        });

        elBrightness.addEventListener('change', () => pushStateToServer());

        function renderHaloMessage(msg) {
            if (msg) {
                elHaloMsg.textContent = `" ${msg} "`;
                elHaloMsg.classList.remove('empty');
            } else {
                elHaloMsg.textContent = 'halo의 메시지를 기다리는 중...';
                elHaloMsg.classList.add('empty');
            }
        }

        function applyStateToUi() {
            elPower.checked    = state.power;
            elCharging.checked = state.charging;
            elBrightness.value = state.brightness;
            elBrightVal.textContent = state.brightness + '%';
            updateVisuals();
        }

        async function pollState() {
            try {
                const res = await fetch(`${MCP_WORKER_URL}/state`);
                if (!res.ok) return;
                const text = await res.text();
                if (text === '{}' || text === lastStateStr) return;
                lastStateStr = text;
                const s = JSON.parse(text);
                if (typeof s.power      === 'boolean') state.power      = s.power;
                if (typeof s.brightness === 'number')  state.brightness = s.brightness;
                if (typeof s.charging   === 'boolean') state.charging   = s.charging;
                if (typeof s.battery    === 'number')  state.battery    = s.battery;
                applyStateToUi();
            } catch (err) {}
        }

        async function pollMessage() {
            try {
                const res = await fetch(`${MCP_WORKER_URL}/last-message`);
                if (!res.ok) return;
                const data = await res.json();
                renderHaloMessage(data.message);
            } catch (err) {}
        }

        let lowBatteryAlerted = false;
        let longUptimeAlerted = false;
        let fullChargeAlerted = false;

        setInterval(() => {
            if (state.power && state.battery > 0 && !state.charging) {
                const loss = (2 / 60) * (state.brightness / 100);
                state.battery = Math.max(0, state.battery - loss);
                state.uptimeMinutes = parseFloat((state.uptimeMinutes + 1/60).toFixed(4));

                if (state.battery <= 20 && !lowBatteryAlerted) {
                    lowBatteryAlerted = true;
                    pushHaloMessage('배고파요, 충전해주세요.');
                }
                if (state.battery > 20) lowBatteryAlerted = false;

                if (state.uptimeMinutes >= 360 && !longUptimeAlerted) {
                    longUptimeAlerted = true;
                    state.power = false;
                    elPower.checked = false;
                    pushHaloMessage('저 좀 쉬어도 될까요?');
                    pushStateToServer();
                }

                if (state.battery === 0) {
                    state.power = false;
                    elPower.checked = false;
                }
            }

            if (state.charging && state.battery < 100) {
                state.battery = Math.min(100, state.battery + (2 / 60));
                fullChargeAlerted = false;
            }

            if (state.charging && state.battery >= 100 && !fullChargeAlerted) {
                fullChargeAlerted = true;
                state.battery = 100;
                pushHaloMessage('배불러요. 이제 일할 수 있어요.');
                pushStateToServer();
            }

            updateVisuals();
        }, 1000);

        async function initState() {
            try {
                const res = await fetch(`${MCP_WORKER_URL}/state`);
                if (!res.ok) { applyStateToUi(); return; }
                const text = await res.text();
                if (text && text !== '{}') {
                    lastStateStr = text;
                    const s = JSON.parse(text);
                    if (typeof s.power      === 'boolean') state.power      = s.power;
                    if (typeof s.brightness === 'number')  state.brightness = s.brightness;
                    if (typeof s.charging   === 'boolean') state.charging   = s.charging;
                    if (typeof s.battery    === 'number')  state.battery    = s.battery;
                }
            } catch (e) {}
            applyStateToUi();
        }

        initState();
        pollMessage();
        setInterval(pollState,   2000);
        setInterval(pollMessage, 3000);
    </script>
</body>
</html>
