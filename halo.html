<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>halo 가상기기 쇼룸</title>
    <style>
        :root {
            --bg-color: #0d0f14;
            --lamp-color: #B8D4F0;
            --base-color: #C0392B;
            --body-color: #7EB5D6;
            --brightness: 40%;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: #e0e0e0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #fff;
            margin-bottom: 8px;
            font-weight: 400;
            letter-spacing: 0.1em;
            font-size: 22px;
        }

        .subtitle {
            color: #7EB5D6;
            font-size: 12px;
            letter-spacing: 0.2em;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .container {
            display: flex;
            width: 1000px;
            max-width: 100%;
            background: #13161e;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* 왼쪽 컨트롤 패널 */
        .control-panel {
            width: 45%;
            padding: 32px;
            border-right: 1px solid #1e2230;
        }

        /* halo 메시지 박스 */
        .halo-message-box {
            background: linear-gradient(135deg, #0d1520, #131a28);
            border: 1px solid #2a3a52;
            border-left: 3px solid #7EB5D6;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 24px;
            min-height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .halo-message-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        .halo-message-text {
            font-size: 14px;
            color: #B8D4F0;
            line-height: 1.5;
            font-style: italic;
        }

        .halo-message-text.empty {
            color: #4a5568;
            font-style: normal;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 10px;
            color: #7a8499;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* 전원 / 충전 스위치 행 */
        .power-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 30px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a2e3a;
            transition: .4s; border-radius: 30px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 22px; width: 22px;
            left: 4px; bottom: 4px;
            background-color: #fff;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #7EB5D6; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* 충전 스위치 — 켜지면 녹색 */
        .switch-charging input:checked + .slider { background-color: #22c55e; }

        /* 배터리 */
        .battery-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0d1016;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #1e2230;
        }

        .battery-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .battery-gauge {
            font-size: 22px;
            font-weight: 700;
            color: #7EB5D6;
            font-variant-numeric: tabular-nums;
        }

        .battery-gauge.low { color: #ef4444; }

        .charge-label {
            font-size: 11px;
            color: #4a5568;
            letter-spacing: 0.05em;
        }

        .charge-label.charging { color: #22c55e; }
        .charge-label.discharging { color: #6b7280; }

        /* 밝기 슬라이더 */
        .range-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .range-label { font-size: 12px; color: #7a8499; text-transform: uppercase; letter-spacing: 0.08em; }
        .range-val { font-size: 14px; font-weight: 700; color: #7EB5D6; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #1e2230;
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #7EB5D6;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(126,181,214,0.5);
        }

        /* 색온도 고정 표시 */
        .fixed-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0d1016;
            border: 1px solid #1e2230;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            color: #7EB5D6;
        }

        .fixed-badge span { color: #4a5568; font-size: 11px; }

        /* 오른쪽 비주얼 패널 */
        .visual-panel {
            width: 55%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 30px;
            transition: background-color 0.5s;
        }

        .visual-panel svg {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <h1>halo</h1>
    <div class="subtitle">Nordic Mood — Virtual Device Showroom</div>

    <div class="container">

        <!-- 컨트롤 패널 -->
        <div class="control-panel">

            <!-- halo 메시지 박스 -->
            <div class="halo-message-box">
                <div class="halo-message-icon">🌙</div>
                <div class="halo-message-text empty" id="halo-message">halo의 메시지를 기다리는 중...</div>
            </div>

            <!-- 전원 -->
            <div class="form-group">
                <div class="power-row">
                    <label style="margin:0;">전원 ON / OFF</label>
                    <label class="switch">
                        <input type="checkbox" id="power" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- 충전 (신규) -->
            <div class="form-group">
                <div class="power-row">
                    <label style="margin:0;">충전 ON / OFF</label>
                    <label class="switch switch-charging">
                        <input type="checkbox" id="charging">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- 배터리 -->
            <div class="form-group">
                <label>배터리 잔량</label>
                <div class="battery-display">
                    <div class="battery-left">
                        <span id="battery-gauge" class="battery-gauge">80.0%</span>
                        <span id="charge-label" class="charge-label discharging">방전중</span>
                    </div>
                </div>
            </div>

            <!-- 밝기 -->
            <div class="form-group">
                <div class="range-row">
                    <span class="range-label">밝기</span>
                    <span id="brightness-val" class="range-val">40%</span>
                </div>
                <input type="range" id="brightness" min="0" max="100" value="40">
            </div>

            <!-- 색온도 (고정) -->
            <div class="form-group">
                <label>색온도 (고정)</label>
                <div class="fixed-badge">
                    🌡️ 2700K — 전구색 (따뜻함) <span>변경 불가</span>
                </div>
            </div>

        </div>

        <!-- 비주얼 패널 -->
        <div class="visual-panel" id="visual-panel">
            <svg id="halo-svg" width="100%" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="haloGlow" gradientUnits="userSpaceOnUse"
                                    cx="340" cy="203" r="300">
                        <stop id="gStop0" offset="0%"   stop-color="#fffef5" stop-opacity="0.85" />
                        <stop id="gStop1" offset="22%"  stop-color="#fff8dc" stop-opacity="0.52" />
                        <stop id="gStop2" offset="48%"  stop-color="#ffe89a" stop-opacity="0.20" />
                        <stop id="gStop3" offset="72%"  stop-color="#ffe89a" stop-opacity="0.06" />
                        <stop id="gStop4" offset="100%" stop-color="#ffe89a" stop-opacity="0" />
                    </radialGradient>
                    <linearGradient id="lampGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%"   stop-color="#ddd0a0"/>
                        <stop offset="22%"  stop-color="#fffdf2"/>
                        <stop offset="55%"  stop-color="#ffffff"/>
                        <stop offset="78%"  stop-color="#fffdf2"/>
                        <stop offset="100%" stop-color="#ddd0a0"/>
                    </linearGradient>
                    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%"   stop-color="#3d7a9a"/>
                        <stop offset="28%"  stop-color="#7EB5D6"/>
                        <stop offset="65%"  stop-color="#9fcfe6"/>
                        <stop offset="100%" stop-color="#3d7a9a"/>
                    </linearGradient>
                    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%"   stop-color="#6a0f08"/>
                        <stop offset="25%"  stop-color="#C0392B"/>
                        <stop offset="62%"  stop-color="#d9534f"/>
                        <stop offset="100%" stop-color="#6a0f08"/>
                    </linearGradient>
                    <linearGradient id="baseShadow" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
                        <stop offset="100%" stop-color="#000" stop-opacity="0.28"/>
                    </linearGradient>
                </defs>

                <circle id="glowEllipse" cx="340" cy="203" r="300" fill="url(#haloGlow)" />

                <rect id="diffuser" x="309" y="20" width="62" height="188" rx="4"
                      fill="url(#lampGrad)" fill-opacity="0.97" />
                <rect id="lightCore" x="317" y="30" width="12" height="172" rx="3"
                      fill="#fff" fill-opacity="0.35" />
                <rect x="351" y="30" width="6" height="172" rx="2"
                      fill="#fff" fill-opacity="0.15" />
                <ellipse cx="340" cy="208" rx="31" ry="5"
                         fill="#c8a020" fill-opacity="0.20" />

                <path id="bodyPath"
                      d="M 309,208 L 254,349 L 426,349 L 371,208 Z"
                      fill="url(#bodyGrad)" />
                <path d="M 309,208 L 268,320 L 284,320 L 321,214 Z"
                      fill="#fff" fill-opacity="0.07" />
                <line x1="340" y1="215" x2="340" y2="343"
                      stroke="#fff" stroke-opacity="0.10" stroke-width="1.5" />
                <line x1="254" y1="349" x2="426" y2="349"
                      stroke="#2d6a8a" stroke-width="1" />

                <rect id="basePath" x="309" y="349" width="62" height="86" rx="3"
                      fill="url(#baseGrad)" />
                <rect x="309" y="349" width="62" height="86" rx="3"
                      fill="url(#baseShadow)" />
                <rect x="309" y="349" width="62" height="8" rx="3"
                      fill="#fff" fill-opacity="0.12" />
                <rect x="317" y="353" width="10" height="78"
                      fill="#fff" fill-opacity="0.09" rx="2" />

                <ellipse cx="340" cy="438" rx="31" ry="6"
                         fill="#000" fill-opacity="0.20" />
            </svg>
        </div>
    </div>

    <script>
        // ── 1. Worker URL 하드코딩 (폴링 버튼 제거) ─────────────
        const MCP_WORKER_URL = "https://halo.typica-918.workers.dev";

        // ── 2. 상태 초기화 ────────────────────────────────────────
        let state = {
            power: true,
            battery: 80.0,
            brightness: 40,
            charging: false,
            uptimeMinutes: 0,
        };

        // ── 3. DOM 캐시 ──────────────────────────────────────────
        const elPower       = document.getElementById('power');
        const elCharging    = document.getElementById('charging');
        const elBattery     = document.getElementById('battery-gauge');
        const elChargeLabel = document.getElementById('charge-label');
        const elBrightness  = document.getElementById('brightness');
        const elBrightVal   = document.getElementById('brightness-val');
        const elVisualPanel = document.getElementById('visual-panel');
        const elHaloMsg     = document.getElementById('halo-message');
        const elGlow        = document.getElementById('glowEllipse');
        const elDiffuser    = document.getElementById('diffuser');
        const elLightCore   = document.getElementById('lightCore');

        // ── 4. 비주얼 렌더링 ─────────────────────────────────────
        function updateVisuals() {
            elBattery.textContent = state.battery.toFixed(1) + '%';
            elBattery.classList.toggle('low', state.battery <= 20);

            if (state.charging) {
                elChargeLabel.textContent = '충전중 ⚡';
                elChargeLabel.className = 'charge-label charging';
            } else {
                elChargeLabel.textContent = '방전중';
                elChargeLabel.className = 'charge-label discharging';
            }

            if (!state.power || state.battery <= 0) {
                elGlow.style.opacity = '0';
                elDiffuser.setAttribute('fill-opacity', '0.05');
                elLightCore.setAttribute('fill-opacity', '0');
                elVisualPanel.style.backgroundColor = '#080a0e';
                return;
            }

            const b = state.brightness / 100;
            elGlow.style.opacity = Math.max(0.05, b * 0.95);
            elDiffuser.setAttribute('fill-opacity', (0.1 + b * 0.35).toFixed(2));
            elLightCore.setAttribute('fill-opacity', (0.2 + b * 0.65).toFixed(2));

            document.getElementById('gStop1').setAttribute('offset', `${5  + b * 15}%`);
            document.getElementById('gStop2').setAttribute('offset', `${10 + b * 30}%`);
            document.getElementById('gStop3').setAttribute('offset', `${20 + b * 45}%`);
            document.getElementById('gStop4').setAttribute('offset', `${35 + b * 65}%`);

            elVisualPanel.style.backgroundColor = `rgba(13,15,20,${1 - b * 0.15})`;
        }

        // ── 5. 서버에 상태 저장 (가드 조건 제거) ────────────────
        let lastStateStr = "";

        async function pushStateToServer() {
            try {
                const body = JSON.stringify(state);
                await fetch(`${MCP_WORKER_URL}/state`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body,
                });
                lastStateStr = body;
            } catch (err) {
                console.error('상태 저장 오류:', err);
            }
        }

        async function pushHaloMessage(message) {
            try {
                await fetch(`${MCP_WORKER_URL}/last-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });
                renderHaloMessage(message);
            } catch (err) {
                console.error('발화 저장 오류:', err);
            }
        }

        // ── 6. UI → 서버 이벤트 핸들러 ──────────────────────────
        elPower.addEventListener('change', (e) => {
            state.power = e.target.checked;
            if (!state.power) pushHaloMessage('저 켜주세요, 심심해요.');
            updateVisuals();
            pushStateToServer();
        });

        elCharging.addEventListener('change', (e) => {
            state.charging = e.target.checked;
            updateVisuals();
            pushStateToServer();
        });

        elBrightness.addEventListener('input', (e) => {
            state.brightness = parseInt(e.target.value);
            elBrightVal.textContent = state.brightness + '%';
            updateVisuals();
        });

        elBrightness.addEventListener('change', (e) => {
            state.brightness = parseInt(e.target.value);
            elBrightVal.textContent = state.brightness + '%';
            updateVisuals();
            pushStateToServer();
        });

        // ── 7. halo 메시지 표시 ───────────────────────────────────
        function renderHaloMessage(msg) {
            if (msg) {
                elHaloMsg.textContent = `" ${msg} "`;
                elHaloMsg.classList.remove('empty');
            } else {
                elHaloMsg.textContent = 'halo의 메시지를 기다리는 중...';
                elHaloMsg.classList.add('empty');
            }
        }

        // ── 8. 서버 → UI 상태 반영 ───────────────────────────────
        function applyStateToUi() {
            elPower.checked      = state.power;
            elCharging.checked   = state.charging;
            elBrightness.value   = state.brightness;
            elBrightVal.textContent = state.brightness + '%';
            updateVisuals();
        }

        // ── 9. MCP 폴링 (자동 시작, 가드 없음) ──────────────────
        async function pollState() {
            try {
                const res = await fetch(`${MCP_WORKER_URL}/state`);
                if (!res.ok) return;
                const text = await res.text();
                if (text === '{}' || text === lastStateStr) return;
                lastStateStr = text;
                const serverState = JSON.parse(text);
                if (typeof serverState.power      === 'boolean') state.power      = serverState.power;
                if (typeof serverState.brightness === 'number')  state.brightness = serverState.brightness;
                if (typeof serverState.charging   === 'boolean') state.charging   = serverState.charging;
                if (typeof serverState.battery    === 'number')  state.battery    = serverState.battery;
                applyStateToUi();
            } catch (err) {
                // 연결 실패 무시
            }
        }

        async function pollMessage() {
            try {
                const res = await fetch(`${MCP_WORKER_URL}/last-message`);
                if (!res.ok) return;
                const data = await res.json();
                renderHaloMessage(data.message);
            } catch (err) {}
        }

        // ── 10. 배터리 소모 시뮬레이터 (1초) ────────────────────
        let lowBatteryAlerted = false;
        let longUptimeAlerted = false;

        setInterval(() => {
            if (state.power && state.battery > 0 && !state.charging) {
                const loss = (2 / 60) * (state.brightness / 100);
                state.battery = Math.max(0, state.battery - loss);
                state.uptimeMinutes = parseFloat((state.uptimeMinutes + 1/60).toFixed(4));

                if (state.battery <= 20 && !lowBatteryAlerted) {
                    lowBatteryAlerted = true;
                    pushHaloMessage('배고파요, 충전해주세요.');
                }
                if (state.battery > 20) lowBatteryAlerted = false;

                if (state.uptimeMinutes >= 360 && !longUptimeAlerted) {
                    longUptimeAlerted = true;
                    state.power = false;
                    elPower.checked = false;
                    pushHaloMessage('저 좀 쉬어도 될까요?');
                    pushStateToServer();
                }

                if (state.battery === 0) {
                    state.power = false;
                    elPower.checked = false;
                }

                updateVisuals();
            }

            if (state.charging && state.battery < 100) {
                state.battery = Math.min(100, state.battery + (2 / 60));
                updateVisuals();
            }

            if (state.charging && state.battery >= 100) {
                state.battery = 100;
                pushHaloMessage('배불러요. 이제 일할 수 있어요.');
                pushStateToServer();
            }
        }, 1000);

        // ── 11. 초기화 및 폴링 자동 시작 ─────────────────────────
        async function initState() {
            try {
                const res = await fetch(`${MCP_WORKER_URL}/state`);
                if (!res.ok) { applyStateToUi(); return; }
                const text = await res.text();
                if (text && text !== '{}') {
                    lastStateStr = text;
                    const s = JSON.parse(text);
                    if (typeof s.power      === 'boolean') state.power      = s.power;
                    if (typeof s.brightness === 'number')  state.brightness = s.brightness;
                    if (typeof s.charging   === 'boolean') state.charging   = s.charging;
                    if (typeof s.battery    === 'number')  state.battery    = s.battery;
                }
            } catch (e) {}
            applyStateToUi();
        }

        initState();
        pollMessage();
        setInterval(pollState,   2000);
        setInterval(pollMessage, 3000);
    </script>
</body>
</html>
